url: https://connorb.github.io/preMetabolizer/
authors:
  Connor Brown:
    href: https://connorb.github.io/
template:
  bootstrap: 5
  light-switch: true

reference:
  - title: Package overview
    contents:
      - preMetabolizer-package

  - title: Data access
    desc: Download and read meteorological and hydrological data from external sources.
    contents:
      - ncei_data
      - ncei_datasets
      - ncei_stations
      - ncei_bbox
      - cdo
      - cdo_request_count
      - get_noaa_stations
      - closest_noaa_stations
      - get_ghcnh
      - get_noaa_ghg
      - get_nasa_data
      - get_usgs_elev
      - iem_networks
      - iem_stations
      - iem_station
      - iem_current
      - iem_ob_history
      - iem_daily
      - ks_meso_vars
      - ks_meso_time_series
      - ks_meso_stations
      - ks_meso_station_activity
      - ks_meso_most_recent
      - ks_meso_fw13
      - tex_meso_stations
      - tex_meso_current
      - tex_meso_time_series
      - read_shp

  - title: Chemistry calculations
    desc: >
      Calculate dissolved gas concentrations, solubility constants, and related
      thermodynamic quantities.
    contents:
      - calc_o2_sat
      - calc_co2_sat
      - calc_ch4_sat
      - calc_n2o_sat
      - calc_n2_sat
      - calc_ar_sat
      - calc_co2_mol_kg
      - calc_co2_mg_l
      - calc_k0
      - calc_vapor_press
      - xco2_to_pco2
      - pco2_to_xco2

  - title: Physical property calculations
    desc: Calculate water density, depth from pressure, and solar radiation.
    contents:
      - calc_water_density
      - calc_water_height
      - calc_par

  - title: Statistical utilities
    desc: Descriptive statistics and outlier detection for time series data.
    contents:
      - calc_bin_width
      - calc_cv
      - calc_mode
      - calc_exceedance_prob
      - rcpp_calc_exceedance_prob
      - flag_z

  - title: Unit conversion
    desc: Convert between common units used in hydrology and atmospheric science.
    contents:
      - convert_flow
      - convert_pressure
      - correct_bp

  - title: Time utilities
    desc: Work with meteorological seasons and solar time.
    contents:
      - get_season
      - even_timesteps
      - convert_to_solar_time

  - title: Data
    desc: Built-in reference datasets.
    contents:
      - french_creek
      - kings_discharge

articles:
  - title: Workflows
    desc: End-to-end examples preparing data for streamMetabolizer.
    contents:
      - french-creek
      - kings-creek
      - chemistry-calculations
      - physical-properties
      - time-series-utilities
      - ks-mesonet
      - iem
      - tex-mesonet
      - noaa
